<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 SEATWORK1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            animation: slide 12s ease-in-out infinite;
            filter: blur(6px) brightness(1);
            transform: scale(1.1) rotate(-2deg);
        }
        
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(255, 217, 78, 0.201);
            z-index: -1;
        }
        
        @keyframes slide {
            0% {
                background-image: url("https://i.pinimg.com/1200x/c1/58/ca/c158cabb40de51b5ca5b8ea219f6b4a3.jpg");
            }
            40% {
                background-image: url("https://i.pinimg.com/736x/76/94/51/769451b9f0470e2a8b0a662981c66aab.jpg");
            }
            80% {
                background-image: url("https://i.pinimg.com/1200x/5c/5e/ec/5c5eecea16df453e6c2198ef1840e088.jpg");
            }
            100% {
                background-image: url("https://i.pinimg.com/736x/8f/9d/e4/8f9de4a984b745d748dc90ac554bce91.jpg");
            }
        }

        .login-box {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(18px);
    border-radius: 25px;
    padding: 45px 35px;
    width: 360px;
    margin: auto;
    margin-top: 70px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(255, 255, 255, 0.15);
}

/* MAIN TITLE */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    letter-spacing: 2px;
    color: #f5e6c8;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
}

/* SUBHEADINGS */
h2 {
    font-size: 14px;
    letter-spacing: 2px;
    color: #e6d3a3;
    text-transform: uppercase;
    margin-bottom: 5px;
}

/* INPUTS */
.form-control {
    border-radius: 30px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    padding: 10px 15px;
}

.form-control::placeholder {
    color: #ddd;
}

/* BUTTON */
.btn-elegant {
    background: linear-gradient(135deg, #d4af37, #b8962e);
    border: none;
    color: white;
    border-radius: 30px;
    padding: 8px 25px;
    transition: 0.3s;
}

.btn-elegant:hover {
    background: linear-gradient(135deg, #f5d76e, #c9a93d);
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
}

/* SECOND BUTTON */
.btn-secondary {
    border-radius: 30px;
}

/* CHECKBOX TEXT */
.toggle-box {
    margin-top: 10px;
    font-size: 13px;
    color: #f1e4c3;
}

/* INSTRUCTIONS */
#instructions {
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 10px;
    font-size: 13px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* LINK */
a {
    color: #f5d76e;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* EXTRA: GOLD LINE UNDER TITLE */
h1::after {
    content: "";
    display: block;
    width: 60px;
    height: 2px;
    background: gold;
    margin: 10px auto 0;
    opacity: 0.7;
}
    </style>
</head>

<body>

    <div class="login-box text-center">
        <h1>Login</h1>

        <button class="btn btn-light btn-sm mb-3" onclick="toggleInstructions()">Show Instructions</button>

        <p id="instructions" style="display:none;">
            Enter the correct username and password.<br>
            Username: admin <br>
            Password: 1234
        </p>

        <h2 class="mt-3">Username</h2>
        <input type="text" id="username" class="form-control mb-3" placeholder="Enter username">

        <h2>Password</h2>
        <input type="password" id="password" class="form-control mb-3" placeholder="Enter password">

        <div class="form-check text-start">
            <input class="form-check-input" type="checkbox" id="checkboxID" onclick="function_name_here()">
            <label class="form-check-label">Stay logged in</label>
        </div>

        <p id="checkboxMessage" class="toggle-box"></p>

        <button class="btn btn-elegant mt-3" onclick="login()">Login</button>
        <button class="btn btn-secondary mt-3">Cancel</button>

        <p class="mt-3">
            <a href="https://www.w3schools.com" target="_blank" class="text-light">Learn more</a>
        </p>
    </div>

    <script>
        function toggleInstructions() {
            let info = document.getElementById("instructions");

            if (info.style.display === "none") {
                info.style.display = "block";
            } else {
                info.style.display = "none";
            }
        }

        function function_name_here() {
            let variable_name = document.getElementById("checkboxID").checked; 

            switch(variable_name) {
                case true:
                    document.getElementById("checkboxMessage").innerHTML = "You will stay logged in.";
                break;

                case false:
                    document.getElementById("checkboxMessage").innerHTML = "";
                break;
            }
        }

        function login() {

            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            if (user === "admin" && pass === "1234") {
                window.alert("Access Granted! Welcome " + user);
            } else {
                window.alert("Access Denied! Incorrect username or password.");
            }
        }
    </script>

</body>
</html>
