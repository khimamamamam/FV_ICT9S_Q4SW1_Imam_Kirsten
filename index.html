<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 SEATWORK1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow-x: hidden;
            color: #ffeeb7;
        }
        
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            animation: slide 12s ease-in-out infinite;
            filter: blur(6px) brightness(1);
            transform: scale(1.1) rotate(-2deg);
        }
        
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(255, 217, 78, 0.201);
            z-index: -1;
        }
        
        @keyframes slide {
            0% {
                background-image: url("https://i.pinimg.com/1200x/c1/58/ca/c158cabb40de51b5ca5b8ea219f6b4a3.jpg");
            }
            40% {
                background-image: url("https://i.pinimg.com/736x/76/94/51/769451b9f0470e2a8b0a662981c66aab.jpg");
            }
            80% {
                background-image: url("https://i.pinimg.com/1200x/5c/5e/ec/5c5eecea16df453e6c2198ef1840e088.jpg");
            }
            100% {
                background-image: url("https://i.pinimg.com/736x/8f/9d/e4/8f9de4a984b745d748dc90ac554bce91.jpg");
            }
        }


        .login-box {
            background: rgba(255, 223, 120, 0.12);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 45px 35px;
            width: 360px;
            margin: auto;
            margin-top: 70px;
            border: 1px solid rgba(255, 223, 120, 0.4);

            animation: glowPulse 3s ease-in-out infinite;
        }


        @keyframes glowPulse {
            0% {
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.3),
                            0 0 40px rgba(255, 215, 0, 0.2);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 223, 120, 0.7),
                            0 0 80px rgba(255, 215, 0, 0.5);
            }
            100% {
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.3),
                            0 0 40px rgba(255, 215, 0, 0.2);
            }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            letter-spacing: 3px;
            color: #fff3c4;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.8);
        }

        h1::after {
            content: "";
            display: block;
            width: 70px;
            height: 2px;
            background: linear-gradient(to right, #ffd700, #fff3c4);
            margin: 12px auto 0;
        }

        h2 {
            font-size: 13px;
            letter-spacing: 2px;
            color: #ffe8a3;
            text-transform: uppercase;
        }

        .form-control {
            border-radius: 30px;
            background: rgba(255, 223, 120, 0.2);
            border: 1px solid rgba(255, 223, 120, 0.3);
            color: #fff8dc;
            padding: 10px 15px;
        }

        .form-control:focus {
            background: rgba(255, 223, 120, 0.2) !important;
            color: #fff8dc !important;
            border: 1px solid rgba(255, 223, 120, 0.5);
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
        }

        .form-control::placeholder {
            color: #fff3c4;
        }

        .form-control:hover {
            box-shadow: 0 0 10px rgba(255, 223, 120, 0.5);
            transition: 0.3s;
        }
        .btn-elegant {
            background: linear-gradient(135deg, #ffd700, #ffcc33);
            border: none;
            color: #5a4500;
            border-radius: 30px;
            padding: 8px 25px;
            transition: all 0.3s ease;
        }

        .btn-elegant:hover {
            color: #5a4500;
            transition: all 0.3 ease;
            transform: scale(1.08);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.8),
                        0 0 30px rgba(255, 223, 120, 0.6);
            background: linear-gradient(135deg, #fff3c4, #ffd700);
        }

        .btn-secondary {
            border-radius: 30px;
            background: rgba(255, 223, 120, 0.25);
            border: none;
            color: #fff3c4;
        }

        .toggle-box {
            margin-top: 10px;
            font-size: 13px;
            color: #fff3c4;
        }

        #instructions {
            background: rgba(255, 223, 120, 0.15);
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            border: 1px solid rgba(255, 223, 120, 0.4);
            color: #fff8dc;
        }

        a {
            color: #ffd700;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        h1::after {
            content: "";
            display: block;
            width: 60px;
            height: 2px;
            background: gold;
            margin: 10px auto 0;
            opacity: 0.7;
        }

        .btn-light {
            background: linear-gradient(135deg, #ffe27a, #ffd700);
            border: none;
            color: #5a4500;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .btn-light:hover {
            transform: scale(1.05);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.7);
            background: linear-gradient(135deg, #fff3c4, #ffd700);
        }

        kbd {
            background: linear-gradient(135deg, #ffd00075, #ffcc3374);
            color: #5a4500;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 15px;
            box-shadow: 0 0 6px rgba(255, 217, 0, 0.694);
        }

        #instructions {
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #instructions.show {
            opacity: 1;
        }

    </style>
</head>

<body>

    <div class="login-box text-center">
        <h1>Login</h1>

        <button class="btn btn-light btn-sm mb-3" onclick="toggleInstructions()">Show Instructions</button>

        <p id="instructions" style="display:none;">
            Enter the correct username and password.<br>
            Password: RoyalcoreLover123
        </p>

        <h2 class="mt-3">Username</h2>
        <input type="text" id="username" class="form-control mb-3" placeholder="Enter username">

        <h2>Password</h2>
        <input type="password" id="password" class="form-control mb-3" placeholder="Enter password">

        <div class="form-check text-start">
            <input class="form-check-input" type="checkbox" id="checkboxID" onclick="function_name_here()">
            <label class="form-check-label">Stay logged in</label>
        </div>

        <p id="checkboxMessage" class="toggle-box"></p>

        <button class="btn btn-elegant mt-3" onclick="login()">Login</button>
        <button class="btn btn-secondary mt-3">Cancel</button>

        <p class="mt-3">
            <a href="https://www.w3schools.com" target="_blank">Learn more</a>
        </p>
    </div>

    <script>
        function toggleInstructions() {
            let info = document.getElementById("instructions");

            if (info.classList.contains("show")) {
                info.classList.remove("show");
                setTimeout(() => info.style.display = "none", 300);
            } else {
                info.style.display = "block";
                setTimeout(() => info.classList.add("show"), 10);
            }
        }

        function function_name_here() {
            let variable_name = document.getElementById("checkboxID").checked; 

            switch(variable_name) {
                case true:
                    document.getElementById("checkboxMessage").innerHTML = "<kbd>You will stay logged in</kbd>";
                break;

                case false:
                    document.getElementById("checkboxMessage").innerHTML = "";
                break;
            }
        }

        function login() {
            let user = document.getElementById("username").value.trim();
            let pass = document.getElementById("password").value.trim();

            if (pass === "RoyalcoreLover123") {
                alert("⭐Access Granted! Welcome " + user);
            } else {
                alert("❌Access Denied! Incorrect password.");
            }
            }

    </script>

</body>
</html>
