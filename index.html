<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 SEATWORK1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Orbitron', sans-serif;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            animation: slide 12s ease-in-out infinite;
            filter: blur(6px) brightness(1);
            transform: scale(1.1) rotate(-2deg);
        }
        
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(255, 217, 78, 0.201);
            z-index: -1;
        }
        
        @keyframes slide {
            0% {
                background-image: url("https://i.pinimg.com/736x/d7/c6/3a/d7c63a05c3afc61325be53c4be5d728d.jpg");
            }
            40% {
                background-image: url("https://i.pinimg.com/control1/1200x/64/02/7d/64027daf8b4998a8d4374d577c3bc585.jpg");
            }
            80% {
                background-image: url("https://i.pinimg.com/control1/736x/8f/65/63/8f6563a9d339ed641b026cb444d1fe3d.jpg");
            }
            100% {
                background-image: url("https://i.pinimg.com/1200x/f9/6b/cb/f96bcb05e4b84fd5cd189b6cb7995202.jpg");
            }
        }

        .login-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 350px;
            margin: auto;
            margin-top: 80px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-elegant {
            background: #c8a97e;
            border: none;
            color: white;
        }

        .btn-elegant:hover {
            background: #a88c64;
        }

        .form-control {
            border-radius: 20px;
        }

        .toggle-box {
            margin-top: 10px;
            font-size: 14px;
            color: #ddd;
        }
    </style>
</head>

<body>

    <div class="login-box text-center">
        <h1>Login</h1>

        <button class="btn btn-light btn-sm mb-3" onclick="toggleInstructions()">Show Instructions</button>

        <p id="instructions" style="display:none;">
            Enter the correct username and password.<br>
            Username: admin <br>
            Password: 1234
        </p>

        <h2 class="mt-3">Username</h2>
        <input type="text" id="username" class="form-control mb-3" placeholder="Enter username">

        <h2>Password</h2>
        <input type="password" id="password" class="form-control mb-3" placeholder="Enter password">

        <div class="form-check text-start">
            <input class="form-check-input" type="checkbox" id="checkboxID" onclick="function_name_here()">
            <label class="form-check-label">Stay logged in</label>
        </div>

        <p id="checkboxMessage" class="toggle-box"></p>

        <button class="btn btn-elegant mt-3" onclick="login()">Login</button>
        <button class="btn btn-secondary mt-3">Cancel</button>

        <p class="mt-3">
            <a href="https://www.w3schools.com" target="_blank" class="text-light">Learn more</a>
        </p>
    </div>

    <script>
        function toggleInstructions() {
            let info = document.getElementById("instructions");

            if (info.style.display === "none") {
                info.style.display = "block";
            } else {
                info.style.display = "none";
            }
        }

        function function_name_here() {
            let variable_name = document.getElementById("checkboxID").checked; 

            switch(variable_name) {
                case true:
                    document.getElementById("checkboxMessage").innerHTML = "You will stay logged in.";
                break;

                case false:
                    document.getElementById("checkboxMessage").innerHTML = "";
                break;
            }
        }

        function login() {

            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            if (user === "admin" && pass === "1234") {
                window.alert("Access Granted! Welcome " + user);
            } else {
                window.alert("Access Denied! Incorrect username or password.");
            }
        }
    </script>

</body>
</html>
